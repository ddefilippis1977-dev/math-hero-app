<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Math Hero - esercizi interattivi</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="topbar" aria-label="Pannello principale">
        <div>
          <p class="eyebrow">Math Hero</p>
          <h1>Esercizi di matematica</h1>
        </div>
        <div class="controls" aria-label="Impostazioni">
          <label class="toggle">
            <input id="soundToggle" type="checkbox" checked />
            <span>Suoni</span>
          </label>
          <label class="toggle">
            <input id="motionToggle" type="checkbox" />
            <span>Animazioni leggere</span>
          </label>
          <button id="resetBtn" class="icon-button" type="button" aria-label="Ricomincia livello">R</button>
        </div>
      </section>

      <section class="stage" aria-live="polite">
        <div class="mascot-zone">
          <div id="mascot" class="mascot runner" role="img" aria-label="Mascotte blu sorridente">
            <div class="quills"></div>
            <div class="face">
              <span class="eye left"></span>
              <span class="eye right"></span>
              <span class="smile"></span>
            </div>
            <div class="glove ok-glove">OK</div>
            <div class="shoe"></div>
          </div>
          <div id="robot" class="robot" role="img" aria-label="Piccolo robot amichevole">
            <div class="antenna"></div>
            <div class="visor">
              <span></span>
              <span></span>
            </div>
            <div class="body"></div>
          </div>
        </div>

        <div class="progress-panel">
          <div>
            <p id="levelLabel" class="panel-label">Livello 1</p>
            <h2 id="levelTitle">Addizioni facili</h2>
          </div>
          <div class="stars" id="stars" aria-label="Stelle completate"></div>
        </div>
      </section>

      <section class="level-picker" aria-label="Scegli livello">
        <p class="panel-label">Scegli livello</p>
        <nav class="level-strip" id="levelStrip" aria-label="Livelli disponibili">
          <button class="level active" type="button" data-level="0">1</button>
          <button class="level" type="button" data-level="1">2</button>
          <button class="level" type="button" data-level="2">3</button>
          <button class="level" type="button" data-level="3">4</button>
          <button class="level" type="button" data-level="4">5</button>
          <button class="level" type="button" data-level="5">6</button>
          <button class="level" type="button" data-level="6">7</button>
          <button class="level" type="button" data-level="7">8</button>
          <button class="level" type="button" data-level="8">9</button>
          <button class="level" type="button" data-level="9">10</button>
          <button class="level" type="button" data-level="10">11</button>
          <button class="level" type="button" data-level="11">12</button>
          <button class="level" type="button" data-level="12">13</button>
          <button class="level" type="button" data-level="13">14</button>
          <button class="level" type="button" data-level="14">15</button>
          <button class="level" type="button" data-level="15">16</button>
          <button class="level" type="button" data-level="16">17</button>
          <button class="level" type="button" data-level="17">18</button>
          <button class="level" type="button" data-level="18">19</button>
          <button class="level" type="button" data-level="19">20</button>
        </nav>
      </section>

      <section class="worksheet" id="worksheet" aria-label="Esercizi"></section>

      <section id="completeCard" class="complete-card" hidden>
        <h2>Bravo, livello completato!</h2>
        <p>La mascotte fa OK. Puoi passare al livello successivo.</p>
        <button id="nextBtn" class="primary" type="button">Prossimo livello</button>
      </section>
    </main>

    <div id="levelParty" class="level-party" aria-live="polite" hidden>
      <div class="mini-firework mini-firework-a"></div>
      <div class="mini-firework mini-firework-b"></div>
      <div class="mini-firework mini-firework-c"></div>
      <div class="thumbs-hero" role="img" aria-label="Mascotte blu con pollice in su">
        <div class="thumbs-quills"></div>
        <div class="thumbs-face">
          <span class="thumbs-eye left"></span>
          <span class="thumbs-eye right"></span>
          <span class="thumbs-mouth"></span>
        </div>
        <div class="thumbs-hand">OK</div>
        <div class="thumbs-text">Livello superato!</div>
      </div>
    </div>

    <div id="finalParty" class="final-party" aria-live="polite" hidden>
      <div class="firework firework-a"></div>
      <div class="firework firework-b"></div>
      <div class="firework firework-c"></div>
      <div class="party-message">
        <h2>Missione completata!</h2>
        <p>Tutti i livelli sono corretti.</p>
        <button id="partyCloseBtn" class="primary" type="button">Gioca ancora</button>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
